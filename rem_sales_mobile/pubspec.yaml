name: rem_sales_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 📦 Isar Core pour l'approche Offline-First
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  bloc_test: ^9.1.5       
  mocktail: ^1.0.4        

  # ⚙️ Moteur de génération standard
  build_runner: ^2.4.6
  
  # Utilisation de la version du générateur patchée pour s'isoler des conflits d'analyzer
  isar_generator: ^3.1.0+1

# 🚀 Force le moteur de test à utiliser des versions compatibles avec l'analyzer d'Isar
dependency_overrides:
  test_api: 0.7.11
  matcher: 0.12.19